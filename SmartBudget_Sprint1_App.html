<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SmartBudget</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0f1e;
    --surface: #111827;
    --surface2: #1a2235;
    --surface3: #202d42;
    --border: rgba(255,255,255,0.07);
    --accent: #4ade80;
    --accent2: #34d399;
    --accentB: #60a5fa;
    --accentC: #f472b6;
    --accentD: #fb923c;
    --accentE: #a78bfa;
    --text: #f0f4ff;
    --text2: #8899b0;
    --text3: #4a5a70;
    --danger: #f87171;
    --font-head: 'Syne', sans-serif;
    --font-body: 'DM Sans', sans-serif;
    --radius: 16px;
    --radius-sm: 10px;
    --glow: 0 0 40px rgba(74,222,128,0.12);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── AUTH SCREEN ─── */
  .auth-bg {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(74,222,128,0.13) 0%, transparent 70%),
                radial-gradient(ellipse 60% 40% at 85% 80%, rgba(96,165,250,0.08) 0%, transparent 60%),
                var(--bg);
    padding: 24px;
  }

  .auth-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    width: 100%;
    max-width: 420px;
    padding: 48px 40px;
    box-shadow: 0 32px 80px rgba(0,0,0,0.5), var(--glow);
    animation: slideUp 0.5s cubic-bezier(0.16,1,0.3,1);
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .auth-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 36px;
  }

  .auth-logo-icon {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, var(--accent), var(--accentB));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }

  .auth-logo-text {
    font-family: var(--font-head);
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }

  .auth-title {
    font-family: var(--font-head);
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 6px;
    letter-spacing: -0.5px;
  }

  .auth-sub {
    color: var(--text2);
    font-size: 14px;
    margin-bottom: 32px;
    font-weight: 300;
  }

  .field { margin-bottom: 18px; }

  .field label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--text2);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .field input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 15px;
    padding: 13px 16px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .field input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(74,222,128,0.12);
  }

  .field input::placeholder { color: var(--text3); }

  .btn-primary {
    width: 100%;
    background: var(--accent);
    color: #0a1a10;
    border: none;
    border-radius: var(--radius-sm);
    font-family: var(--font-head);
    font-size: 15px;
    font-weight: 700;
    padding: 15px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
    margin-top: 8px;
    letter-spacing: 0.2px;
  }

  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(74,222,128,0.3); }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .auth-toggle {
    text-align: center;
    margin-top: 24px;
    font-size: 14px;
    color: var(--text2);
  }

  .auth-toggle button {
    background: none; border: none;
    color: var(--accent);
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    text-decoration: underline;
    text-underline-offset: 3px;
  }

  .error-msg {
    background: rgba(248,113,113,0.1);
    border: 1px solid rgba(248,113,113,0.3);
    border-radius: var(--radius-sm);
    color: var(--danger);
    font-size: 13px;
    padding: 10px 14px;
    margin-bottom: 16px;
  }

  /* ─── APP LAYOUT ─── */
  .app-layout {
    display: flex;
    min-height: 100vh;
  }

  /* ─── SIDEBAR ─── */
  .sidebar {
    width: 220px;
    min-height: 100vh;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 28px 16px;
    flex-shrink: 0;
    position: sticky;
    top: 0;
    height: 100vh;
  }

  .sidebar-logo {
    display: flex; align-items: center; gap: 10px;
    padding: 0 8px;
    margin-bottom: 40px;
  }

  .sidebar-logo-icon {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, var(--accent), var(--accentB));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
  }

  .sidebar-logo-text {
    font-family: var(--font-head);
    font-size: 18px;
    font-weight: 800;
    letter-spacing: -0.3px;
  }

  .sidebar-nav { flex: 1; }

  .nav-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text3);
    font-weight: 600;
    padding: 0 8px;
    margin-bottom: 8px;
    margin-top: 24px;
  }

  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 14px;
    font-weight: 400;
    color: var(--text2);
    transition: all 0.15s;
    margin-bottom: 2px;
    border: none; background: none; width: 100%; text-align: left;
    font-family: var(--font-body);
  }

  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: rgba(74,222,128,0.12); color: var(--accent); font-weight: 500; }
  .nav-item .nav-icon { font-size: 16px; width: 20px; text-align: center; }

  .sidebar-user {
    border-top: 1px solid var(--border);
    padding-top: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    padding-left: 4px;
  }

  .user-avatar {
    width: 34px; height: 34px;
    background: linear-gradient(135deg, var(--accentE), var(--accentB));
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    font-weight: 700;
    flex-shrink: 0;
    font-family: var(--font-head);
  }

  .user-info { flex: 1; min-width: 0; }
  .user-name { font-size: 13px; font-weight: 500; truncate: ellipsis; white-space: nowrap; overflow: hidden; }
  .user-role { font-size: 11px; color: var(--text3); }

  .btn-logout {
    background: none; border: none;
    color: var(--text3);
    cursor: pointer;
    font-size: 16px;
    padding: 4px;
    border-radius: 6px;
    transition: color 0.15s, background 0.15s;
    display: flex;
  }
  .btn-logout:hover { color: var(--danger); background: rgba(248,113,113,0.1); }

  /* ─── MAIN CONTENT ─── */
  .main-content {
    flex: 1;
    padding: 40px 48px;
    overflow-y: auto;
    background: radial-gradient(ellipse 70% 40% at 100% 0%, rgba(96,165,250,0.05) 0%, transparent 60%);
  }

  .page-header {
    margin-bottom: 36px;
  }

  .page-greeting {
    font-size: 13px;
    color: var(--text2);
    font-weight: 300;
    margin-bottom: 6px;
  }

  .page-title {
    font-family: var(--font-head);
    font-size: 32px;
    font-weight: 800;
    letter-spacing: -1px;
    line-height: 1.1;
  }

  .page-title span { color: var(--accent); }

  /* ─── BANK CONNECT BANNER ─── */
  .bank-banner {
    background: linear-gradient(135deg, rgba(96,165,250,0.12), rgba(74,222,128,0.08));
    border: 1px solid rgba(96,165,250,0.25);
    border-radius: var(--radius);
    padding: 20px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 32px;
    animation: slideUp 0.4s 0.1s both cubic-bezier(0.16,1,0.3,1);
  }

  .bank-banner-left { display: flex; align-items: center; gap: 14px; }
  .bank-icon { font-size: 28px; }
  .bank-banner-title { font-family: var(--font-head); font-size: 15px; font-weight: 600; }
  .bank-banner-sub { font-size: 13px; color: var(--text2); margin-top: 2px; }

  .btn-connect {
    background: var(--accentB);
    color: #0a1020;
    border: none;
    border-radius: var(--radius-sm);
    font-family: var(--font-head);
    font-size: 13px;
    font-weight: 700;
    padding: 10px 20px;
    cursor: pointer;
    white-space: nowrap;
    transition: transform 0.15s, box-shadow 0.15s;
    flex-shrink: 0;
  }
  .btn-connect:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(96,165,250,0.3); }

  .connected-badge {
    display: flex; align-items: center; gap: 6px;
    background: rgba(74,222,128,0.12);
    border: 1px solid rgba(74,222,128,0.25);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 13px;
    color: var(--accent);
    font-weight: 500;
    flex-shrink: 0;
  }

  /* ─── STATS ROW ─── */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 28px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px 24px;
    position: relative;
    overflow: hidden;
    animation: slideUp 0.4s both cubic-bezier(0.16,1,0.3,1);
  }

  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }

  .stat-card.green::before  { background: var(--accent); }
  .stat-card.blue::before   { background: var(--accentB); }
  .stat-card.pink::before   { background: var(--accentC); }
  .stat-card.orange::before { background: var(--accentD); }

  .stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text3); font-weight: 600; margin-bottom: 10px; }
  .stat-value { font-family: var(--font-head); font-size: 28px; font-weight: 700; letter-spacing: -1px; margin-bottom: 6px; }
  .stat-change { font-size: 12px; color: var(--text2); }
  .stat-change.up   { color: var(--accent); }
  .stat-change.down { color: var(--danger); }

  /* ─── CHARTS GRID ─── */
  .charts-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 24px;
  }

  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
    animation: slideUp 0.5s 0.15s both cubic-bezier(0.16,1,0.3,1);
  }

  .chart-card.full { grid-column: 1 / -1; }

  .chart-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 24px;
  }

  .chart-title {
    font-family: var(--font-head);
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }

  .chart-sub { font-size: 12px; color: var(--text2); margin-top: 3px; }

  .month-tabs {
    display: flex; gap: 4px;
  }

  .month-tab {
    background: none; border: none;
    padding: 5px 10px;
    border-radius: 6px;
    font-size: 12px;
    color: var(--text2);
    cursor: pointer;
    font-family: var(--font-body);
    transition: all 0.15s;
  }
  .month-tab.active { background: var(--surface3); color: var(--text); }
  .month-tab:hover:not(.active) { color: var(--text); }

  /* ─── SVG CHARTS ─── */
  .chart-svg-wrap { width: 100%; overflow: visible; }

  /* ─── BOTTOM GRID ─── */
  .bottom-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }

  /* ─── TRANSACTIONS ─── */
  .tx-list { }

  .tx-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .tx-item:last-child { border-bottom: none; }

  .tx-icon {
    width: 38px; height: 38px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }

  .tx-info { flex: 1; min-width: 0; }
  .tx-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tx-cat { font-size: 12px; color: var(--text2); margin-top: 1px; }
  .tx-date { font-size: 11px; color: var(--text3); margin-top: 1px; }

  .tx-amount { font-family: var(--font-head); font-size: 14px; font-weight: 600; flex-shrink: 0; }
  .tx-amount.neg { color: var(--danger); }
  .tx-amount.pos { color: var(--accent); }

  /* ─── SAVINGS GOALS ─── */
  .goal-item { margin-bottom: 20px; }
  .goal-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
  .goal-name { font-size: 14px; font-weight: 500; }
  .goal-amounts { font-size: 12px; color: var(--text2); }
  .goal-bar-track {
    height: 8px;
    background: var(--surface3);
    border-radius: 4px;
    overflow: hidden;
  }
  .goal-bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 1s cubic-bezier(0.16,1,0.3,1);
  }
  .goal-pct { font-size: 11px; color: var(--text3); margin-top: 5px; }

  /* ─── MODAL ─── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000;
    padding: 24px;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity:0 } to { opacity:1 } }

  .modal-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px;
    width: 100%;
    max-width: 480px;
    animation: slideUp 0.35s cubic-bezier(0.16,1,0.3,1);
    box-shadow: 0 40px 100px rgba(0,0,0,0.6);
  }

  .modal-title { font-family: var(--font-head); font-size: 22px; font-weight: 700; margin-bottom: 6px; letter-spacing: -0.5px; }
  .modal-sub { font-size: 14px; color: var(--text2); margin-bottom: 28px; }

  .bank-option {
    display: flex; align-items: center; gap: 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px 18px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .bank-option:hover { border-color: var(--accentB); background: var(--surface3); }
  .bank-option.selected { border-color: var(--accent); background: rgba(74,222,128,0.07); }

  .bank-option-icon { font-size: 24px; }
  .bank-option-name { font-size: 15px; font-weight: 500; }
  .bank-option-type { font-size: 12px; color: var(--text2); }
  .bank-option-check { margin-left: auto; color: var(--accent); font-size: 18px; }

  .modal-actions { display: flex; gap: 10px; margin-top: 24px; }

  .btn-secondary {
    flex: 1;
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-family: var(--font-head);
    font-size: 14px;
    font-weight: 600;
    padding: 12px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-secondary:hover { background: var(--surface3); }

  /* ─── LEGEND ─── */
  .legend { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 16px; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text2); }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  /* ─── TOOLTIP ─── */
  .tooltip-box {
    position: absolute;
    background: var(--surface3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 12px;
    pointer-events: none;
    white-space: nowrap;
    z-index: 100;
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  }
  .tooltip-label { color: var(--text2); margin-bottom: 2px; }
  .tooltip-val { font-family: var(--font-head); font-weight: 700; font-size: 15px; }

  .loading-spin {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid rgba(74,222,128,0.3);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin-right: 6px;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ─── SCROLLBAR ─── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 900px) {
    .main-content { padding: 24px 20px; }
    .stats-row { grid-template-columns: 1fr 1fr; }
    .charts-grid { grid-template-columns: 1fr; }
    .charts-grid .chart-card.full { grid-column: 1; }
    .bottom-grid { grid-template-columns: 1fr; }
    .sidebar { width: 180px; padding: 20px 12px; }
  }
  @media (max-width: 640px) {
    .app-layout { flex-direction: column; }
    .sidebar { width: 100%; min-height: unset; height: auto; flex-direction: row; flex-wrap: wrap; padding: 16px; position: static; }
    .sidebar-logo { margin-bottom: 0; }
    .sidebar-nav { display: flex; gap: 4px; }
    .nav-label { display: none; }
    .sidebar-user { border-top: none; padding-top: 0; }
    .stats-row { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>
<div id="root"></div>

/* ═══ AUTH SERVICE (Sprint 1: JWT-simulated, localStorage) ═══ */
const AuthService = {
  login(email, password) {
    const user = FAKE_USERS_DB[email.toLowerCase()];
    if (!user || user.passwordHash !== password) throw new Error("Invalid credentials");
    const token = btoa(JSON.stringify({ userId: user.id, email, exp: Date.now() + 3600000 }));
    localStorage.setItem("sb_token", token);
    return { token, user: { id: user.id, name: user.name, email } };
  },
  register(name, email, password) {
    if (FAKE_USERS_DB[email.toLowerCase()]) throw new Error("Account already exists");
    FAKE_USERS_DB[email.toLowerCase()] = { id: `u${Date.now()}`, name, passwordHash: password, accounts: [] };
    return AuthService.login(email, password);
  },
  logout() { localStorage.removeItem("sb_token"); },
  getSession() {
    const token = localStorage.getItem("sb_token");
    if (!token) return null;
    try {
      const payload = JSON.parse(atob(token));
      if (payload.exp < Date.now()) { AuthService.logout(); return null; }
      const dbUser = FAKE_USERS_DB[payload.email];
      return dbUser ? { token, user: { id: dbUser.id, name: dbUser.name, email: payload.email } } : null;
    } catch { return null; }
  }
};

/* ═══════════════════════════════════
   LINE CHART COMPONENT
   ═══════════════════════════════════ */
function LineChart({ data, selectedMonth }) {
  const [tooltip, setTooltip] = useState(null);
  const svgRef = useRef(null);

  const W = 600, H = 200, PAD = { top: 20, right: 20, bottom: 40, left: 50 };
  const chartW = W - PAD.left - PAD.right;
  const chartH = H - PAD.top - PAD.bottom;

  const maxVal = Math.max(...data.map(d => d.total)) * 1.15;
  const xStep = chartW / (data.length - 1);

  const px = (i) => PAD.left + i * xStep;
  const py = (v) => PAD.top + chartH - (v / maxVal) * chartH;

  const pathD = data.map((d, i) => `${i === 0 ? 'M' : 'L'} ${px(i)} ${py(d.total)}`).join(' ');
  const fillD = pathD + ` L ${px(data.length-1)} ${PAD.top + chartH} L ${px(0)} ${PAD.top + chartH} Z`;

  const selectedIdx = data.findIndex(d => d.month === selectedMonth);

  const handleMouseMove = (e) => {
    const rect = svgRef.current.getBoundingClientRect();
    const mouseX = (e.clientX - rect.left) * (W / rect.width);
    let closest = 0, minDist = Infinity;
    data.forEach((_, i) => { const d = Math.abs(mouseX - px(i)); if (d < minDist) { minDist = d; closest = i; } });
    setTooltip({ idx: closest, x: px(closest), y: py(data[closest].total) });
  };

  const yTicks = [0, 500, 1000, 1500, 2000, 2500];

  return (
    <div style={{ position: 'relative' }}>
      <svg ref={svgRef} viewBox={`0 0 ${W} ${H}`} className="chart-svg-wrap"
        onMouseMove={handleMouseMove} onMouseLeave={() => setTooltip(null)} style={{ cursor: 'crosshair' }}>
        <defs>
          <linearGradient id="lineGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor="#4ade80" stopOpacity="0.25" />
            <stop offset="100%" stopColor="#4ade80" stopOpacity="0" />
          </linearGradient>
        </defs>

        {/* Y grid lines */}
        {yTicks.map(v => v <= maxVal && (
          <g key={v}>
            <line x1={PAD.left} x2={PAD.left + chartW} y1={py(v)} y2={py(v)} stroke="rgba(255,255,255,0.05)" strokeWidth="1" />
            <text x={PAD.left - 8} y={py(v) + 4} textAnchor="end" fill="#4a5a70" fontSize="10">
              ${v >= 1000 ? v/1000 + 'k' : v}
            </text>
          </g>
        ))}

        {/* Fill area */}
        <path d={fillD} fill="url(#lineGrad)" />

        {/* Selected month highlight */}
        {selectedIdx >= 0 && (
          <rect x={px(selectedIdx) - xStep/2} width={xStep} y={PAD.top}
            height={chartH} fill="rgba(74,222,128,0.05)" rx="4" />
        )}

        {/* Line */}
        <path d={pathD} fill="none" stroke="#4ade80" strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round" />

        {/* Data points */}
        {data.map((d, i) => (
          <g key={i}>
            <circle cx={px(i)} cy={py(d.total)} r="4" fill="#0a0f1e" stroke="#4ade80" strokeWidth="2" />
            <text x={px(i)} y={PAD.top + chartH + 22} textAnchor="middle" fill="#4a5a70" fontSize="11"
              style={{ fontFamily: 'DM Sans, sans-serif' }}>{d.month}</text>
          </g>
        ))}

        {/* Hover dot */}
        {tooltip && (
          <circle cx={tooltip.x} cy={tooltip.y} r="6" fill="#4ade80" opacity="0.9" />
        )}
      </svg>

      {tooltip && (
        <div className="tooltip-box" style={{
          left: `${(tooltip.x / W) * 100}%`,
          top: `${(tooltip.y / H) * 100}%`,
          transform: 'translate(-50%, -130%)'
        }}>
          <div className="tooltip-label">{data[tooltip.idx].month} Spending</div>
          <div className="tooltip-val">${data[tooltip.idx].total.toLocaleString()}</div>
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════
   DONUT CHART COMPONENT
   ═══════════════════════════════════ */
function DonutChart({ data, selectedMonth }) {
  const [hovered, setHovered] = useState(null);
  const monthData = MONTHLY_SPENDING_DB.find(d => d.month === selectedMonth) || MONTHLY_SPENDING_DB[MONTHLY_SPENDING_DB.length-1];
  const cats = [
    { name: "Housing",       val: monthData.housing,       color: "#60a5fa" },
    { name: "Groceries",     val: monthData.groceries,     color: "#34d399" },
    { name: "Dining",        val: monthData.dining,        color: "#fb923c" },
    { name: "Entertainment", val: monthData.entertainment, color: "#a78bfa" },
    { name: "Transport",     val: monthData.transport,     color: "#f472b6" },
    { name: "Other",         val: monthData.other,         color: "#fbbf24" },
  ];

  const total = cats.reduce((s, c) => s + c.val, 0);
  const R = 70, CX = 90, CY = 90, strokeW = 28;
  const circ = 2 * Math.PI * R;

  let offset = 0;
  const slices = cats.map(c => {
    const dash = (c.val / total) * circ;
    const slice = { ...c, dashArray: `${dash - 2} ${circ - dash + 2}`, dashOffset: -offset };
    offset += dash;
    return slice;
  });

  return (
    <div style={{ display: 'flex', gap: '20px', alignItems: 'center' }}>
      <div style={{ flexShrink: 0, position: 'relative' }}>
        <svg viewBox="0 0 180 180" width="160" height="160">
          {slices.map((s, i) => (
            <circle key={i} cx={CX} cy={CY} r={R}
              fill="none" stroke={s.color} strokeWidth={strokeW}
              strokeDasharray={s.dashArray} strokeDashoffset={s.dashOffset}
              strokeLinecap="butt"
              style={{ transformOrigin: `${CX}px ${CY}px`, transform: 'rotate(-90deg)',
                opacity: hovered === null || hovered === i ? 1 : 0.3,
                transition: 'opacity 0.2s', cursor: 'pointer' }}
              onMouseEnter={() => setHovered(i)}
              onMouseLeave={() => setHovered(null)}
            />
          ))}
          <text x={CX} y={CY - 8} textAnchor="middle" fill="#f0f4ff"
            style={{ fontFamily: 'Syne, sans-serif', fontSize: 18, fontWeight: 700 }}>
            ${hovered !== null ? slices[hovered].val : total.toLocaleString()}
          </text>
          <text x={CX} y={CY + 12} textAnchor="middle" fill="#4a5a70" fontSize="10"
            style={{ fontFamily: 'DM Sans, sans-serif' }}>
            {hovered !== null ? slices[hovered].name : 'Total'}
          </text>
        </svg>
      </div>
      <div className="legend" style={{ flexDirection: 'column', gap: '8px' }}>
        {slices.map((s, i) => (
          <div key={i} className="legend-item" style={{ cursor: 'pointer',
            opacity: hovered === null || hovered === i ? 1 : 0.4, transition: 'opacity 0.2s' }}
            onMouseEnter={() => setHovered(i)} onMouseLeave={() => setHovered(null)}>
            <div className="legend-dot" style={{ background: s.color }} />
            <span style={{ flex: 1, color: '#8899b0', fontSize: 13 }}>{s.name}</span>
            <span style={{ fontFamily: 'Syne, sans-serif', fontSize: 13, fontWeight: 600, color: '#f0f4ff' }}>
              ${s.val.toLocaleString()}
            </span>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════
   BAR CHART COMPONENT
   ═══════════════════════════════════ */
function BarChart({ data }) {
  const [tooltip, setTooltip] = useState(null);
  const W = 600, H = 180, PAD = { top: 10, right: 20, bottom: 30, left: 50 };
  const chartW = W - PAD.left - PAD.right;
  const chartH = H - PAD.top - PAD.bottom;
  const barW = (chartW / data.length) * 0.5;
  const maxVal = Math.max(...data.map(d => d.total)) * 1.2;
  const px = (i) => PAD.left + (chartW / data.length) * i + (chartW / data.length - barW) / 2;
  const bh = (v) => (v / maxVal) * chartH;
  const by = (v) => PAD.top + chartH - bh(v);

  return (
    <div style={{ position: 'relative' }}>
      <svg viewBox={`0 0 ${W} ${H}`} className="chart-svg-wrap" style={{ cursor: 'crosshair' }}>
        {data.map((d, i) => (
          <g key={i} onMouseEnter={() => setTooltip({ idx: i, x: px(i)+barW/2, y: by(d.total) })}
             onMouseLeave={() => setTooltip(null)}>
            <rect x={px(i)} y={PAD.top + chartH} width={barW} height={0}
              fill="rgba(255,255,255,0.05)" rx="3" />
            <rect x={px(i)} y={by(d.total)} width={barW} height={bh(d.total)}
              fill={tooltip?.idx === i ? '#4ade80' : 'rgba(74,222,128,0.4)'} rx="4"
              style={{ transition: 'fill 0.15s, height 0.6s, y 0.6s' }} />
            <text x={px(i) + barW/2} y={H - 8} textAnchor="middle" fill="#4a5a70" fontSize="10"
              style={{ fontFamily: 'DM Sans, sans-serif' }}>{d.month}</text>
          </g>
        ))}
        <line x1={PAD.left} x2={PAD.left} y1={PAD.top} y2={PAD.top+chartH} stroke="rgba(255,255,255,0.05)" />
      </svg>
      {tooltip && (
        <div className="tooltip-box" style={{
          left: `${(tooltip.x / W) * 100}%`, top: `${(tooltip.y / H) * 100}%`,
          transform: 'translate(-50%, -130%)'
        }}>
          <div className="tooltip-label">{data[tooltip.idx].month}</div>
          <div className="tooltip-val">${data[tooltip.idx].total.toLocaleString()}</div>
        </div>
      )}
    </div>
  );
}

            { label: "Savings Rate", value: "24%", color: "pink", change: "↑ 3% from last month", changeClass: "up" },
            { label: "Net Income", value: "$3,500", color: "orange", change: "Direct deposit Jun 1", changeClass: "" },
          ].map((s, i) => (
            <div key={i} className={`stat-card ${s.color}`} style={{ animationDelay: `${i * 0.06}s` }}>
              <div className="stat-label">{s.label}</div>
              <div className="stat-value">{s.value}</div>
              <div className={`stat-change ${s.changeClass}`}>{s.change}</div>
            </div>
          ))}
        </div>

        {/* Charts */}
        <div className="charts-grid">
          {/* Spending Trend - full width */}
          <div className="chart-card full">
            <div className="chart-header">
              <div>
                <div className="chart-title">Monthly Spending Trend</div>
                <div className="chart-sub">6-month history with hover to explore</div>
              </div>
              <div className="month-tabs">
                {MONTHLY_SPENDING_DB.map(d => (
                  <button key={d.month} className={`month-tab ${selectedMonth === d.month ? 'active' : ''}`}
                    onClick={() => setSelectedMonth(d.month)}>{d.month}</button>
                ))}
              </div>
            </div>
            <LineChart data={MONTHLY_SPENDING_DB} selectedMonth={selectedMonth} />
          </div>

          {/* Spending Breakdown Donut */}
          <div className="chart-card">
            <div className="chart-header">
              <div>
                <div className="chart-title">Spending by Category</div>
                <div className="chart-sub">{selectedMonth} breakdown — hover to explore</div>
              </div>
            </div>
            <DonutChart data={MONTHLY_SPENDING_DB} selectedMonth={selectedMonth} />
          </div>

          {/* Bar Chart */}
          <div className="chart-card">
            <div className="chart-header">
              <div>
                <div className="chart-title">Month Comparison</div>
                <div className="chart-sub">Total spending per month</div>
              </div>
            </div>
            <BarChart data={MONTHLY_SPENDING_DB} />
          </div>
        </div>

        {/* Bottom grid */}
        <div className="bottom-grid">
          {/* Transactions */}
          <div className="chart-card">
            <div className="chart-header">
              <div>
                <div className="chart-title">Recent Transactions</div>
                <div className="chart-sub">{bankConnected ? `${transactions.length} imported` : "Connect bank to view"}</div>
              </div>
            </div>
            <div className="tx-list">
              {!bankConnected && (
                <div style={{ textAlign: 'center', padding: '32px 0', color: 'var(--text3)' }}>
                  <div style={{ fontSize: 32, marginBottom: 8 }}>🏦</div>
                  <div style={{ fontSize: 14 }}>Connect your bank to import transactions</div>
                </div>
              )}
              {bankConnected && loadingTx && (
                <div style={{ textAlign: 'center', padding: '24px 0', color: 'var(--text2)' }}>
                  <span className="loading-spin" />Importing transactions…
                </div>
              )}
              {bankConnected && !loadingTx && transactions.slice(0, 7).map(tx => (
                <div key={tx.id} className="tx-item">
                  <div className="tx-icon" style={{ background: `${tx.color}18` }}>
                    {tx.icon}
                  </div>
                  <div className="tx-info">
                    <div className="tx-name">{tx.name}</div>
                    <div className="tx-cat">{tx.category}</div>
                  </div>
                  <div className={`tx-amount ${tx.amount < 0 ? 'neg' : 'pos'}`}>
                    {tx.amount < 0 ? '-' : '+'}${Math.abs(tx.amount).toFixed(2)}
                  </div>
                </div>
              ))}
            </div>
          </div>

          {/* Savings Goals */}
          <div className="chart-card">
            <div className="chart-header">
              <div>
                <div className="chart-title">Savings Goals</div>
                <div className="chart-sub">Track progress toward your targets</div>
              </div>
            </div>
            {GOALS_DB.map(g => {
              const pct = Math.round((g.current / g.target) * 100);
              return (
                <div key={g.id} className="goal-item">
                  <div className="goal-header">
                    <div className="goal-name">{g.icon} {g.name}</div>
                    <div className="goal-amounts">
                      <span style={{ color: 'var(--text)', fontWeight: 500 }}>${g.current.toLocaleString()}</span>
                      <span style={{ color: 'var(--text3)' }}> / ${g.target.toLocaleString()}</span>
                    </div>
                  </div>
                  <div className="goal-bar-track">
                    <div className="goal-bar-fill" style={{ width: `${pct}%`, background: g.color }} />
                  </div>
                  <div className="goal-pct">{pct}% complete · ${(g.target - g.current).toLocaleString()} to go</div>
                </div>
              );
            })}
          </div>
        </div>
      </main>

      {showBankModal && <BankModal onClose={() => setShowBankModal(false)} onConnect={handleBankConnect} />}
    </div>
  );
}

/* ═══════════════════════════════════
   ROOT APP
   ═══════════════════════════════════ */
function App() {
  const [user, setUser] = useState(null);
  const [checking, setChecking] = useState(true);

  useEffect(() => {
    const session = AuthService.getSession();
    if (session) setUser(session.user);
    setChecking(false);
  }, []);

  if (checking) return (
    <div style={{ display:'flex', alignItems:'center', justifyContent:'center', height:'100vh', color:'var(--text2)' }}>
      <span className="loading-spin" /> Loading…
    </div>
  );

  if (!user) return <AuthScreen onLogin={setUser} />;
  return <Dashboard user={user} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
